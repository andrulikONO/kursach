services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: classifieds
      POSTGRES_PASSWORD: classifieds
      POSTGRES_DB: classifieds
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classifieds -d classifieds"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: classifieds
      DB_USER: classifieds
      DB_PASS: classifieds
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: "Admin123!"
      ADMIN_EMAIL: admin@local.test
      ADMIN_PHONE: "+79990000000"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
